# Project information
site_name: 'Liquid'
site_description: 'Liquid RuntimeShader effects for Compose Multiplatform'
site_author: 'Colin McKee'
site_url: 'https://fletchmckee.github.io/liquid/'
remote_branch: gh-pages
edit_uri: ""

# Repository
repo_name: 'Liquid'
repo_url: 'https://github.com/fletchmckee/liquid'

# Configuration
theme:
  name: 'material'
  language: 'en'
  favicon: material/heart
  logo: material/sine-wave
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: 'Roboto'
    code: 'Roboto Mono'

# Navigation
nav:
  - 'Overview': index.md
  - 'WASM Sample ⏏': sample/index.html

# CSS
extra_css:
  - 'css/site.css'

# Extensions
markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

# Plugins
plugins:
  - search
  - minify:
      minify_html: true

validation:
  links:
    absolute_links: ignore
  nav:
    omitted_files: ignore

# Built with https://github.com/squidfunk/mkdocs-material
